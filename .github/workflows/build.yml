name: build-image

# Publishes multi-arch (linux/amd64 + linux/arm64) images for BOTH first-party
# images to GHCR:
#   - ghcr.io/deeptoai-com/kin/app      (the main app: app/worker/migrate/preview-controller/updater)
#   - ghcr.io/deeptoai-com/kin/parser   (the PDF parser sidecar)
#
# Strategy = Docker's standard "distributed build across native runners":
# each arch builds on its OWN native runner (no QEMU), pushes BY DIGEST, then a
# merge job assembles a single manifest list per image. This keeps the heavy SSR
# build (Vite peaks >8GB) on native hardware so arm64 never runs emulated.
#
# Prereq after first run: set the two GHCR packages (kin/app, kin/parser) to PUBLIC
# so anonymous `docker pull` works (Owner does this once in GitHub Packages settings).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # GHCR requires the whole image path lowercase; the org is "Deeptoai-com" so it
  # MUST be written "deeptoai-com" here. Do NOT derive from github.repository (keeps case).
  IMAGE_BASE: ghcr.io/deeptoai-com/kin

jobs:
  # 1) Build each (image x arch) on a native runner, push BY DIGEST (no tag yet).
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: app,    context: '.',                dockerfile: 'Dockerfile',                   platform: linux/amd64, runner: ubuntu-latest }
          - { image: app,    context: '.',                dockerfile: 'Dockerfile',                   platform: linux/arm64, runner: ubuntu-24.04-arm }
          - { image: parser, context: './parser-sidecar', dockerfile: './parser-sidecar/Dockerfile', platform: linux/amd64, runner: ubuntu-latest }
          - { image: parser, context: './parser-sidecar', dockerfile: './parser-sidecar/Dockerfile', platform: linux/arm64, runner: ubuntu-24.04-arm }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare platform pair
        run: echo "PLATFORM_PAIR=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/${{ matrix.image }}

      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          # BUILD_SHA is consumed by the app Dockerfile (baked into the runtime image
          # so /api/health can report the running version). The parser Dockerfile
          # ignores it (harmless "unused build-arg" warning).
          build-args: |
            BUILD_SHA=${{ github.sha }}
          provenance: false   # keep manifest clean (no unknown/unknown attestation entries)
          outputs: type=image,name=${{ env.IMAGE_BASE }}/${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # 2) Per image, merge the per-arch digests into ONE multi-arch tag (latest + sha).
  merge:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [app, parser]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.image }}-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.sha }}

      - name: Create multi-arch manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE_BASE }}/${{ matrix.image }}@sha256:%s ' *)

      - name: Inspect (should show amd64 + arm64)
        run: docker buildx imagetools inspect ${{ env.IMAGE_BASE }}/${{ matrix.image }}:${{ github.sha }}
