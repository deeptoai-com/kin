name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [22.12]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck
        continue-on-error: true

      - name: Lint
        run: pnpm lint

      - name: Validate routes
        run: pnpm validate-routes
        # Non-blocking until the 15 existing REST-route violations are migrated
        # to Server Functions (tracked as a separate remediation task).
        continue-on-error: true

      - name: Unit tests (hard gate)
        run: pnpm test:unit
        env:
          NODE_ENV: test

      - name: Integration/e2e tests
        run: pnpm test
        # Non-blocking: the e2e/integration suite needs a live app server +
        # Postgres (DATABASE_URL). Tracked: provision service containers so it
        # can become a hard gate too.
        continue-on-error: true
        env:
          NODE_ENV: test

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production
          # Match the Dockerfile: the Vite SSR build needs more heap than the
          # Node default (~2GB) or it OOMs (exit 134).
          NODE_OPTIONS: --max-old-space-size=8192
