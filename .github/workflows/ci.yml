name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [22.12]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck
        continue-on-error: true

      - name: Lint
        run: pnpm lint

      - name: Validate routes
        run: pnpm validate-routes
        # Non-blocking until the 15 existing REST-route violations are migrated
        # to Server Functions (tracked as a separate remediation task).
        continue-on-error: true

      - name: Run tests
        run: pnpm test
        # Non-blocking for now: the current suite is e2e/integration and needs a
        # live app server + Postgres (DATABASE_URL). Tracked: split unit vs e2e
        # and provision service containers so this can become a hard gate.
        continue-on-error: true
        env:
          # Minimal env vars for tests (if needed)
          NODE_ENV: test

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production
          # Match the Dockerfile: the Vite SSR build needs more heap than the
          # Node default (~2GB) or it OOMs (exit 134).
          NODE_OPTIONS: --max-old-space-size=8192
