# OxyGenie Docker Compose
# Quick Start: see README "Quick Start → Option A: Docker Compose".
# Usage: docker compose --env-file .env.docker --env-file .env --profile selfhost up -d --build
# .env loads last and overrides .env.docker. Use this to keep existing DB (ex0/constructa).
# migrate/worker/app DATABASE_URL is built from POSTGRES_* with host "db" (not from .env) so
# localhost in .env cannot break DB connectivity. Override POSTGRES_USER/PASSWORD/DB in .env only.
# App: http://localhost:5050 | WebSocket: ws://localhost:3051/ws/agent

# x-app-image for remote registry (CI/CD deployment)
# Override via APP_IMAGE/APP_TAG in .env. Default: oxygenie:latest.
x-app-image: &app_image '${APP_IMAGE:-oxygenie}:${APP_TAG:-latest}'

# x-app-build for local development
x-app-build: &app_build
  build:
    context: .
    dockerfile: Dockerfile
    args:
      # WebSocket URL for sidecar deployment (port 3001 inside container, mapped to 3051)
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3051/ws/agent}

services:
  db:
    image: pgvector/pgvector:0.8.0-pg17
    container_name: ex0-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: ${POSTGRES_DB:?}
    volumes:
      - ex0-data:/var/lib/postgresql/data
    ports:
      - '5432:5432' # expose for host-side tooling (drizzle migrations, etc.)
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d postgres']
      interval: 5s
      timeout: 3s
      retries: 20

  # Ensure POSTGRES_DB exists (handles old volumes created with ex0/constructa).
  # Uses maintenance DB "postgres"; creates POSTGRES_DB if missing; idempotent.
  create-db:
    image: pgvector/pgvector:0.8.0-pg17
    container_name: ex0-create-db
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGDATABASE: postgres
      PGUSER: ${POSTGRES_USER:?}
      PGPASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: ${POSTGRES_DB:?}
    entrypoint:
      - /bin/sh
      - -c
      - "psql -tc \"SELECT 1 FROM pg_database WHERE datname = '$${POSTGRES_DB}'\" | grep -q 1 || psql -c \"CREATE DATABASE \\\"$${POSTGRES_DB}\\\"\""
    restart: 'no'

  minio:
    image: quay.io/minio/minio:latest
    container_name: ex0-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?}
    command: server /data --console-address ":9001"
    volumes:
      - ex0-minio-data:/data
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Web Console
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 3s
      retries: 20

  # one-time bucket/policy provisioning; idempotent; safe to re-run
  provision-minio:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/${MINIO_BUCKET} &&
      mc anonymous set none local/${MINIO_BUCKET} || true
      "
    restart: 'no'

  # Redis for BullMQ jobs/queues
  redis:
    image: redis:7-alpine
    container_name: ex0-redis
    restart: unless-stopped
    command: ['redis-server', '--save', '60', '1', '--loglevel', 'warning']
    volumes:
      - ex0-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

  # Meilisearch for fast lexical/symbol search
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: ex0-meili
    restart: unless-stopped
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?changeme}
    volumes:
      - ex0-meili-data:/meili_data
    healthcheck:
      test: ['CMD', 'curl', '-sSf', 'http://localhost:7700/health']
      interval: 5s
      timeout: 3s
      retries: 40

  # migrations run before app starts, re-created for each new image tag
  # pull_policy: never — use locally built image (app build tags oxygenie:latest); do not pull from registry
  # DATABASE_URL is constructed from POSTGRES_* with host "db" so .env (localhost) cannot override it.
  migrate:
    image: *app_image
    pull_policy: never
    depends_on:
      create-db:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@db:5432/${POSTGRES_DB:?}
      NODE_ENV: production
    entrypoint: ['sh', '-c', 'pnpm run db:migrate']
    restart: 'no'

  # only for local dev, not exposed publicly
  mailhog:
    image: mailhog/mailhog:latest
    container_name: ex0-mailhog
    restart: unless-stopped
    environment:
      MH_STORAGE: memory
    ports:
      - '1025:1025' # SMTP port
      - '8025:8025' # Web UI port
    profiles: ['dev'] # won't run in prod

  # Optional: Cloudflare Tunnel to expose local dev to the internet for real webhooks
  # Requires CLOUDFLARED_TUNNEL_TOKEN in .env
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ex0-cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TUNNEL_TOKEN}
    profiles: ['tunnel']
    restart: unless-stopped

  # Background workers for BullMQ (cron + indexing, etc.)
  # pull_policy: never — use locally built image; do not pull from registry
  worker:
    image: *app_image
    pull_policy: never
    container_name: ex0-worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      provision-minio:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@db:5432/${POSTGRES_DB:?}
      # S3-compatible config to reach MinIO inside the stack
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?}
      S3_BUCKET: ${MINIO_BUCKET:?}
      # Job queue + schedules (Docker default: redis container)
      REDIS_URL: redis://redis:6379
      BULLMQ_PREFIX: ${BULLMQ_PREFIX:-oxygenie}
      DAILY_CREDIT_REFILL_CRON: ${DAILY_CREDIT_REFILL_CRON:-0 3 * * *}
      JOB_DAILY_CREDIT_REFILL_URL: ${JOB_DAILY_CREDIT_REFILL_URL:-http://app:3000/api/jobs/daily-credit-refill}
      JOBS_SECRET: ${JOBS_SECRET:-}
      # Search (Docker default: meilisearch container)
      MEILI_HOST: http://meilisearch:7700
      MEILI_API_KEY: ${MEILI_API_KEY:-${MEILI_MASTER_KEY}}
      SEARCH_REINDEX_ON_BOOT: ${SEARCH_REINDEX_ON_BOOT:-false}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    command: ['npx', 'tsx', 'src/worker/index.ts']
    restart: unless-stopped
    profiles: ['dev', 'selfhost', 'prod']

  # App container (useful for self-host/preview via reverse proxy; in dev run pnpm dev)
  app:
    image: *app_image
    <<: *app_build
    # Note: Dokploy ignores the build section and uses the pre-built image from registry
    # Local development uses: docker compose --profile selfhost up -d --build
    container_name: ex0-app
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      provision-minio:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@db:5432/${POSTGRES_DB:?}
      # S3-compatible config to reach MinIO inside the stack
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?}
      S3_BUCKET: ${MINIO_BUCKET:?}
      # Email (dev uses mailhog: host=mailhog, port=1025)
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-mailhog}
      # Redis + Meili for app features (Docker defaults: container names)
      REDIS_URL: redis://redis:6379
      MEILI_HOST: http://meilisearch:7700
      MEILI_API_KEY: ${MEILI_API_KEY:-${MEILI_MASTER_KEY}}
      # Authentication (Docker port mapping: 5050:5000)
      # External URL for browser redirects
      BETTER_AUTH_URL: http://localhost:5050
      # Internal URL for server-side API calls (inside container)
      BETTER_AUTH_INTERNAL_URL: http://localhost:5000
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?}
      # Mastra Agent (Zhipu AI GLM-4.7 via Mastra built-in gateway)
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:?}
      # Claude Agent SDK configuration
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      # Gemini API for skill icon generation
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CLAUDE_SESSIONS_ROOT: /data/users
      SANDBOX_ENABLED: ${SANDBOX_ENABLED:-false}
      CLAUDE_MCP_STORE_DIR: ${CLAUDE_MCP_STORE_DIR:-src/mcp-store}
      MCP_STORE_DIR: ${MCP_STORE_DIR:-src/mcp-store}
      PYTHON_RUNNER_TIMEOUT_MS: ${PYTHON_RUNNER_TIMEOUT_MS:-10000}
      PYTHON_RUNNER_MAX_OUTPUT_BYTES: ${PYTHON_RUNNER_MAX_OUTPUT_BYTES:-512000}
      PYTHON_RUNNER_MAX_CODE_BYTES: ${PYTHON_RUNNER_MAX_CODE_BYTES:-200000}
      # Structured Outputs for Artifacts (auto-triggered on file-extension hints)
      ENABLE_STRUCTURED_OUTPUTS: ${ENABLE_STRUCTURED_OUTPUTS:-true}
      # Schema generation debug logging (default: enabled)
      SCHEMA_GENERATION_DEBUG: ${SCHEMA_GENERATION_DEBUG:-true}
      # Schema generation trace logging (off|true|full)
      SCHEMA_GENERATION_TRACE: ${SCHEMA_GENERATION_TRACE:-full}
      # Skills Store (production data volume)
      SKILLS_STORE_DIR: /data/skills-store
    volumes:
      - claude-sessions:/data/users
      - skills-store:/data/skills-store
    ports:
      - '5050:5000'
      - '3051:3001'
    profiles: ['selfhost', 'prod']

volumes:
  ex0-data:
  ex0-minio-data:
  ex0-redis-data:
  ex0-meili-data:
  claude-sessions:  # Claude Agent session storage (persists across container restarts)
  skills-store:     # Global Skills Store (persists across image upgrades)
